<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live's Kabob - Neural Tata v11.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Space+Grotesk:wght@700;900&display=swap');
        
        :root {
            --neon-cyan: #00F0FF; --neon-pink: #FF3DBC; --neon-gold: #FFE600;
            --bg-dark: #02040a; --glass-bg: rgba(8, 12, 25, 0.7);
        }

        html, body {
            font-family: 'Pyidaungsu', sans-serif; background-color: var(--bg-dark);
            color: #f8fafc; margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; -webkit-tap-highlight-color: transparent; perspective: 2000px;
        }

        #landing { 
            position: fixed; inset: 0; z-index: 9999; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; padding: 8vh 0; transform-style: preserve-3d;
        }

        .landing-bg {
            position: absolute; inset: -5vw; background: url('https://i.imgur.com/npi3IR8.jpeg') center/contain no-repeat;
            filter: brightness(0.9) contrast(1.15); z-index: 3; transform: translateZ(50px);
        }

        .cyber-floor {
            position: absolute; bottom: -30vh; left: -50vw; right: -50vw; height: 100vh;
            background-image: linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
            background-size: 80px 80px; transform: perspective(1200px) rotateX(75deg) translateZ(-150px);
            animation: grid-scroll 3s linear infinite; z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, transparent 70%);
        }
        
        @keyframes grid-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

        .premium-unlock-container {
            position: relative; z-index: 100; display: flex; flex-direction: column; align-items: center;
            margin-bottom: 5vh; transform-style: preserve-3d; animation: float-core 5s ease-in-out infinite;
        }

        .diamond-core-container {
            position: relative; width: 140px; height: 140px; margin-bottom: 2vh;
            display: flex; justify-content: center; align-items: center; cursor: pointer; transform-style: preserve-3d;
        }

        .diamond-layer-3 { position: absolute; inset: 30px; background: rgba(0, 240, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8); }

        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: column; background: var(--bg-dark); }
        
        .page { 
            position: relative; width: 100%; max-width: 680px; height: 78vh; 
            background: linear-gradient(rgba(10,15,30,0.85), rgba(10,15,30,0.85)) padding-box, linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold)) border-box;
            border: 3px solid transparent; backdrop-filter: blur(40px); border-radius: 40px; padding: 3.5rem; overflow-y: auto; display: none; flex-direction: column; 
        }
        .page.active { display: flex; animation: card-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #ai-panel { position: fixed; inset: 0; background: rgba(2,4,10,0.95); backdrop-filter: blur(30px); z-index: 1000; display: none; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 20px; }
        
        .msg.bot { background: rgba(30, 41, 60, 0.6); align-self: flex-start; border: 1px solid rgba(0,240,255,0.3); color: #ffffff; border-radius: 20px; padding: 15px; }
        .msg.user { background: var(--neon-cyan); color: #000; font-weight: 900; align-self: flex-end; border-radius: 20px; padding: 15px; }

        .scan-bar { position: absolute; width: 100vw; height: 6px; background: #fff; box-shadow: 0 0 60px 15px var(--neon-cyan); z-index: 10000; top: -100px; }
        @keyframes laser-scan { 0% { top: -10vh; } 100% { top: 110vh; } }
    </style>
</head>
<body>
    <div id="scan-fx" class="scan-bar"></div>
    <div id="landing">
        <div class="cyber-floor"></div>
        <div class="landing-bg"></div>
        <div class="premium-unlock-container">
            <div class="diamond-core-container" onclick="triggerScan()">
                <div class="diamond-layer-3"></div>
                <i data-lucide="zap" class="text-white relative z-20" size="50"></i>
            </div>
            <span class="text-cyan-400 font-black tracking-widest text-xs uppercase">Initialize System</span>
        </div>
    </div>

    <div id="app-container">
        <header class="p-4 border-b border-cyan-400/30 flex justify-between items-center">
            <h1 class="text-white font-bold uppercase">Live's Kabob Core</h1>
            <button onclick="openChatPanel()" class="p-2 bg-cyan-500/20 rounded-full"><i data-lucide="message-square" class="text-cyan-400"></i></button>
        </header>
        <main class="flex-1 flex items-center justify-center p-6">
            <div id="sop-pages"></div>
        </main>
        <footer class="p-8 flex justify-center gap-10">
            <button onclick="changePage(-1)" class="p-4 border border-cyan-400 rounded-full"><i data-lucide="chevron-left" class="text-cyan-400"></i></button>
            <button onclick="changePage(1)" class="p-4 border border-cyan-400 rounded-full"><i data-lucide="chevron-right" class="text-cyan-400"></i></button>
        </footer>
    </div>

    <div id="ai-panel">
        <header class="p-6 border-b border-cyan-400 flex justify-between">
            <span class="text-cyan-400 font-bold">TATA v11.9 AI</span>
            <button onclick="closeChatPanel()"><i data-lucide="x" class="text-white"></i></button>
        </header>
        <div id="chat-box" class="chat-area"></div>
        <div class="p-4 flex gap-2">
            <input type="text" id="ai-input" class="flex-1 bg-white/10 p-4 rounded-xl text-white outline-none" placeholder="မေးမြန်းနိုင်ပါပြီ..." onkeypress="if(event.key==='Enter') sendQuery()">
            <button onclick="sendQuery()" class="p-4 bg-cyan-400 rounded-xl"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let curPage = 0;
        const apiKey = "YOUR_GEMINI_API_KEY"; // အစ်ကို့ API Key ဤနေရာတွင် ထည့်ပါ

        const sopData = [{ t: "မဟာဗျူဟာ", c: "Live's ကို Premium Restaurant အဖြစ် ကူးပြောင်းမည်။" },{ t: "၇ စက္ကန့် စံနှုန်း", c: "ဧည့်သည်ရောက်လျှင် ၇ စက္ကန့်အတွင်း နှုတ်ဆက်ပါ။" },{ t: "Final Wipe", c: "ဟင်းပွဲမထွက်ခင် ပန်းကန်ဘောင်ကို တစ်ရှူးဖြူဖြင့် သုတ်ပါ။" }];

        function triggerScan() { 
            document.getElementById('scan-fx').style.animation = 'laser-scan 0.8s forwards'; 
            setTimeout(() => {
                document.getElementById('landing').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                buildSOP();
            }, 600);
        }

        function buildSOP() {
            const container = document.getElementById('sop-pages');
            container.innerHTML = '';
            sopData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `page ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `<h1 class="text-cyan-400 text-4xl font-black mb-6">${item.t}</h1><p class="text-2xl">${item.c}</p>`;
                container.appendChild(div);
            });
        }

        function changePage(dir) {
            const p = document.querySelectorAll('.page');
            if (p.length === 0) return;
            p[curPage].classList.remove('active');
            curPage = (curPage + dir + p.length) % p.length;
            p[curPage].classList.add('active');
        }

        function openChatPanel() { document.getElementById('ai-panel').style.display = 'flex'; }
        function closeChatPanel() { document.getElementById('ai-panel').style.display = 'none'; }

        async function sendQuery() {
            const input = document.getElementById('ai-input');
            const q = input.value.trim();
            if (!q) return;
            addMessage(q, 'user');
            input.value = '';
            // AI Call logic goes here
            addMessage("တာတာ အချက်အလက်များကို စစ်ဆေးနေပါတယ်ရှင့်...", 'bot');
        }

        function addMessage(txt, side) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.textContent = txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
