<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live's Kabob - Neural Tata v11.9 (Stable Core)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Space+Grotesk:wght@700;900&display=swap');
        
        :root {
            --neon-cyan: #00F0FF;
            --neon-pink: #FF3DBC;
            --neon-gold: #FFE600;
            --bg-dark: #02040a;
            --glass-bg: rgba(8, 12, 25, 0.7);
        }

        html, body {
            font-family: 'Pyidaungsu', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            perspective: 2000px;
        }

        /* LANDING & FX */
        #landing { 
            position: fixed; inset: 0; z-index: 9999; 
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            padding: 8vh 0;
        }

        .landing-bg {
            position: absolute; inset: -5vw;
            background: url('https://i.imgur.com/npi3IR8.jpeg') center/contain no-repeat;
            filter: brightness(0.9) contrast(1.15);
            z-index: 3;
            transform: translateZ(50px);
        }

        .cyber-floor {
            position: absolute; bottom: -30vh; left: -50vw; right: -50vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(1200px) rotateX(75deg);
            animation: grid-scroll 3s linear infinite;
            z-index: 1;
            opacity: 0.5;
        }
        
        @keyframes grid-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

        .scan-bar { position: absolute; width: 100vw; height: 6px; background: #fff; box-shadow: 0 0 50px var(--neon-cyan); z-index: 10000; top: -100px; }

        /* MAIN APP UI */
        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: column; background: var(--bg-dark); position: relative; }
        
        header { 
            position: relative; z-index: 100; background: rgba(2,4,10,0.85); backdrop-filter: blur(30px); 
            padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(0,240,255,0.3); 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .ai-hub { position: fixed; bottom: 30px; right: 25px; z-index: 500; display: flex; flex-direction: column; align-items: flex-end; }
        .ai-bubble { 
            background: #ffffff; color: #000; padding: 20px 25px; border-radius: 30px 30px 4px 30px; 
            font-size: 0.95rem; font-weight: 800; margin-bottom: 15px; 
            box-shadow: 0 15px 50px rgba(0,240,255,0.7); opacity: 0; transform: translateY(20px); 
            transition: 0.5s; max-width: 320px; border-left: 10px solid var(--neon-pink);
        }
        .ai-bubble.show { opacity: 1; transform: translateY(0); }
        .ai-avatar { width: 140px; filter: drop-shadow(0 0 35px var(--neon-cyan)); cursor: pointer; animation: float 4s infinite ease-in-out; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .sop-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; perspective: 1500px; }
        .page { 
            width: 100%; max-width: 680px; height: 75vh; 
            background: rgba(10,15,30,0.85); border: 2px solid var(--neon-cyan);
            backdrop-filter: blur(40px); border-radius: 40px; padding: 3.5rem; display: none; flex-direction: column; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .page.active { display: flex; animation: card-reveal 0.6s ease-out forwards; }
        @keyframes card-reveal { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        /* CHAT PANEL */
        #ai-panel { position: fixed; inset: 0; background: rgba(2,4,10,0.95); backdrop-filter: blur(30px); z-index: 1000; display: none; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 20px; }
        
        .chat-input-box { padding: 1.5rem; background: #05080f; display: flex; gap: 15px; border-top: 1px solid rgba(0,240,255,0.3); }
        .chat-input-box input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan); color: #fff; padding: 20px 25px; border-radius: 40px; outline: none; }
        .send-btn { background: var(--neon-cyan); color: #000; width: 65px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 30px; cursor: pointer; }

        .msg { padding: 18px 25px; border-radius: 28px; max-width: 85%; line-height: 1.6; }
        .msg.bot { background: rgba(30, 41, 60, 0.7); align-self: flex-start; border-bottom-left-radius: 6px; border: 1px solid var(--neon-cyan); }
        .msg.user { background: var(--neon-cyan); color: #000; font-weight: 800; align-self: flex-end; border-bottom-right-radius: 6px; }

        /* ADMIN PANEL */
        #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .admin-textarea { width: 100%; height: 120px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan); border-radius: 15px; color: #fff; padding: 15px; margin-bottom: 1.5rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .pass-box { background: #0a0f1e; border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 3rem; text-align: center; width: 90%; max-width: 400px; }
        .pass-input { width: 100%; background: #000; border: 1px solid var(--neon-cyan); color: #fff; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; }
        .shake { animation: shake 0.5s; border-color: red !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <!-- Audio Effects -->
    <audio id="chat-bgm" loop><source src="https://actions.google.com/sounds/v1/science_fiction/computer_data_processing.ogg" type="audio/ogg"></audio>
    <div id="scan-fx" class="scan-bar"></div>

    <div id="password-modal" class="modal-overlay">
        <div class="pass-box" id="pass-box">
            <h2 class="text-cyan-400 font-black text-xl uppercase tracking-widest">Admin Authorization</h2>
            <input type="password" id="admin-pass-input" class="pass-input" placeholder="•••••••••" onkeypress="if(event.key==='Enter')verifyAdmin()">
            <button onclick="verifyAdmin()" class="w-full py-4 bg-cyan-500 text-black font-black rounded-xl">Unlock Neural Core</button>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="pass-box" id="name-box">
            <h2 class="text-cyan-400 font-black text-xl uppercase mb-4">Identity Link</h2>
            <input type="text" id="user-name-input" class="pass-input" placeholder="သင့်နာမည်ကို ရိုက်ပါ..." onkeypress="if(event.key==='Enter')submitName()">
            <button onclick="submitName()" class="w-full py-4 bg-cyan-500 text-black font-black rounded-xl">Connect</button>
        </div>
    </div>

    <!-- Landing -->
    <div id="landing">
        <div class="cyber-floor"></div>
        <div class="landing-bg"></div>
        <div class="relative z-50 mb-10 flex flex-col items-center">
            <div class="w-28 h-28 border-4 border-cyan-400 rotate-45 flex items-center justify-center cursor-pointer hover:scale-110 transition-all" onclick="triggerScan()">
                <i data-lucide="zap" class="text-white -rotate-45" size="50"></i>
            </div>
            <div class="mt-8 px-6 py-2 bg-cyan-500/10 border border-cyan-400 rounded-full text-cyan-400 text-[10px] font-black uppercase tracking-[0.4em]">Initialize System</div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container">
        <header>
            <div class="flex items-center gap-4">
                <img src="https://i.imgur.com/gAev5xH.png" class="w-14 h-14 rounded-xl border border-cyan-400">
                <div>
                    <div class="font-black text-white uppercase tracking-widest text-sm">Live's Kabob</div>
                    <div class="text-[9px] text-cyan-400 font-bold uppercase tracking-[0.5em]">Neural Tata v11.9</div>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleMute()" class="p-3 bg-cyan-500/10 border border-cyan-400/20 rounded-full"><i data-lucide="volume-2" id="vol-icon" size="20" class="text-cyan-400"></i></button>
                <button onclick="openPasswordModal()" class="p-3 bg-purple-500/10 border border-purple-400/20 rounded-full"><i data-lucide="cpu" size="20" class="text-purple-400"></i></button>
            </div>
        </header>

        <main class="sop-stage">
            <div id="sop-pages"></div>
            <div class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-10">
                <button onclick="changePage(-1)" class="w-16 h-16 rounded-full border border-cyan-400 flex items-center justify-center text-cyan-400 bg-black/50"><i data-lucide="chevron-left" size="30"></i></button>
                <div id="page-indicator" class="text-cyan-400 font-black text-2xl tracking-widest min-w-[100px] text-center">1 / 15</div>
                <button onclick="changePage(1)" class="w-16 h-16 rounded-full border border-cyan-400 flex items-center justify-center text-cyan-400 bg-black/50"><i data-lucide="chevron-right" size="30"></i></button>
            </div>
        </main>

        <div class="ai-hub">
            <div class="ai-bubble" id="speak-bubble">မင်္ဂလာပါ ကိုတုတ် ❤️ အသင့်ပါပဲ။</div>
            <img src="https://i.imgur.com/OTpyIVK.png" class="ai-avatar" onclick="toggleAI()">
        </div>
    </div>

    <!-- AI Panel -->
    <div id="ai-panel">
        <header class="p-6 flex justify-between border-b border-cyan-400/30">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center border border-cyan-400/50">
                    <img src="https://i.imgur.com/OTpyIVK.png" class="w-full h-full object-contain">
                </div>
                <div class="text-cyan-400 font-black uppercase text-lg tracking-widest">TATA Neural Core</div>
            </div>
            <button onclick="closeChatPanel()"><i data-lucide="x" class="text-white" size="35"></i></button>
        </header>
        <div class="chat-area" id="chat-box"></div>
        <div id="typing-box" class="px-8 py-2 text-xs text-cyan-400 hidden animate-pulse">Thinking... ✨</div>
        <div class="chat-input-box">
            <input type="text" id="ai-input" placeholder="အမိန့်ပေးပါ ကိုတုတ်..." onkeypress="if(event.key==='Enter')sendQuery()">
            <div class="send-btn" onclick="sendQuery()"><i data-lucide="sparkles" size="28"></i></div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-400 pb-4">
            <h1 class="text-cyan-400 font-black text-2xl uppercase">Neural Settings</h1>
            <button onclick="closeAdmin()"><i data-lucide="x" class="text-white"></i></button>
        </div>
        <label class="text-xs text-yellow-400 font-black uppercase mb-2 block">Brain Rules</label>
        <textarea id="admin-rules" class="admin-textarea" placeholder="ဥပမာ- ယဥ်ယဥ်ကျေးကျေးပြောပါ။"></textarea>
        <label class="text-xs text-pink-400 font-black uppercase mb-2 block">Live Data/Menu</label>
        <textarea id="admin-data" class="admin-textarea" placeholder="ဆိုင်အချက်အလက်များ..."></textarea>
        <button onclick="saveAdminData()" class="w-full py-5 bg-cyan-500 text-black font-black uppercase rounded-xl">Inject to Core</button>
    </div>

    <script>
        lucide.createIcons();
        let curPage = 0; let currentUserName = ""; let isChatting = false; let isMuted = false;
        const robotSounds = [
            "https://actions.google.com/sounds/v1/science_fiction/robot_code.ogg",
            "https://actions.google.com/sounds/v1/science_fiction/beep_short.ogg",
            "https://actions.google.com/sounds/v1/science_fiction/digital_beeps.ogg",
            "https://actions.google.com/sounds/v1/science_fiction/machine_scan.ogg"
        ];

        function playRodob() {
            if(isMuted || !currentUserName) return;
            const audio = new Audio(robotSounds[Math.floor(Math.random()*robotSounds.length)]);
            audio.volume = 0.3;
            audio.play().catch(()=>{});
        }

        function triggerScan() {
            document.getElementById('scan-fx').animate([{top: '-10vh'}, {top: '110vh'}], {duration: 800, fill: 'forwards'});
            setTimeout(() => {
                document.getElementById('landing').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                buildSOP();
                setInterval(playRodob, 10000);
                startPersonality();
            }, 600);
        }

        const sopData = [
            {t:"မဟာဗျူဟာ", c:"Live's ကို Premium Restaurant အဖြစ် ပြောင်းလဲမည်။"},
            {t:"ရဲဘော် ၂၂ ဦး", c:"စီမံ (၃)၊ မီးဖို (၈)၊ အကင် (၄)၊ ဝန်ဆောင်မှု (၆)၊ ပံ့ပိုးရေး (၁)။"},
            {t:"Battle-Ready", c:"မနက် ၈:၄၅ ရောက်ရမည်။ ၉:၀၀ အသင့်ဖြစ်ရမည်။"},
            {t:"ဖုန်းတင်းကျပ်မှု", c:"ညနေ ၃ နာရီမှ ၉ နာရီအထိ ဖုန်းမသုံးရ။"},
            {t:"၇ စက္ကန့် စံနှုန်း", c:"ဧည့်သည်ရောက်လျှင် ၇ စက္ကန့်အတွင်း နှုတ်ဆက်ပါ။"},
            {t:"Final Wipe", c:"ဟင်းပွဲမထွက်ခင် ပန်းကန်ဘောင်ကို တစ်ရှူးဖြူဖြင့် သုတ်ပါ။"},
            {t:"၃ စက္ကန့် စစ်ဆေးမှု", c:"အနံ့၊ အရောင်၊ အပူချိန်ကို ၃ စက္ကန့်အတွင်း စစ်ပါ။"}
        ];

        function buildSOP() {
            const container = document.getElementById('sop-pages');
            container.innerHTML = '';
            sopData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `page ${i===0?'active':''}`;
                div.innerHTML = `<div class="mb-10"><span class="bg-cyan-500/20 text-cyan-400 px-4 py-1 rounded-lg text-[10px] font-black uppercase border border-cyan-400/40">Protocol ${i+1}</span></div><h1 class="text-cyan-400 font-black text-4xl mb-8 border-l-4 border-pink-500 pl-6 uppercase">${item.t}</h1><div class="text-white text-2xl font-bold leading-relaxed">${item.c}</div>`;
                container.appendChild(div);
            });
        }

        function changePage(dir) {
            const pages = document.querySelectorAll('.page');
            if(pages.length === 0) return;
            pages[curPage].classList.remove('active');
            curPage = (curPage + dir + pages.length) % pages.length;
            pages[curPage].classList.add('active');
            document.getElementById('page-indicator').textContent = `${curPage + 1} / ${pages.length}`;
        }

        function toggleAI() { if(!currentUserName) document.getElementById('name-modal').style.display='flex'; else openChatPanel(); }
        function submitName() {
            const n = document.getElementById('user-name-input').value.trim();
            if(n) { currentUserName = n; document.getElementById('name-modal').style.display='none'; openChatPanel(); }
        }
        function openChatPanel() { document.getElementById('ai-panel').style.display='flex'; isChatting=true; document.getElementById('chat-bgm').play().catch(()=>{}); }
        function closeChatPanel() { document.getElementById('ai-panel').style.display='none'; isChatting=false; document.getElementById('chat-bgm').pause(); }

        async function callAI(p) {
            const rules = localStorage.getItem("tata_rules") || "", data = localStorage.getItem("tata_data") || "";
            const sys = `တာတာ (Tata) ဖြစ်သည်။ Live's Kabob ၏ AI Manager။ အရှင်သခင် ကိုတုတ် အတွက် အလုပ်လုပ်သည်။ User သည် ${currentUserName} ဖြစ်သည်။ အဖြေကို မြန်မာလိုပဲ ကျစ်ကျစ်လစ်လစ် ဖြေပါ။ ၈၀/၂၀ Rule သုံးပါ။ \nRules: ${rules}\nData: ${data}`;
            
            try {
                const r = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: p}]}],
                        systemInstruction: {parts: [{text: sys}]}
                    })
                });
                const d = await r.json();
                return d.candidates?.[0]?.content?.parts?.[0]?.text || "နားမလည်ပါရှင့်။ Bridge ကို ပြန်စစ်ပါ။";
            } catch(e) { return "Bridge Connection Error."; }
        }

        async function sendQuery() {
            const input = document.getElementById('ai-input');
            const q = input.value.trim();
            if(!q) return;

            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="msg user">${q}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            document.getElementById('typing-box').classList.remove('hidden');
            const res = await callAI(q);
            document.getElementById('typing-box').classList.add('hidden');
            
            chat.innerHTML += `<div class="msg bot">${res}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function openPasswordModal() { document.getElementById('password-modal').style.display='flex'; }
        function verifyAdmin() { if(document.getElementById('admin-pass-input').value === '@admin$103') { document.getElementById('password-modal').style.display='none'; document.getElementById('admin-panel').style.display='flex'; } else document.getElementById('pass-box').classList.add('shake'); }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
        function saveAdminData() { localStorage.setItem("tata_rules", document.getElementById('admin-rules').value); localStorage.setItem("tata_data", document.getElementById('admin-data').value); closeAdmin(); }
        function toggleMute() { isMuted = !isMuted; document.getElementById('vol-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2'); lucide.createIcons(); }

        function startPersonality() {
            setInterval(() => {
                if(isChatting) return;
                const b = document.getElementById('speak-bubble');
                b.classList.add('show');
                setTimeout(() => b.classList.remove('show'), 8000);
            }, 35000);
        }
    </script>
</body>
</html>
