<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live's Kabob - Neural Tata v11.8 (Ultimate Core)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Space+Grotesk:wght@700;900&display=swap');
        
        :root {
            --neon-cyan: #00F0FF;
            --neon-pink: #FF3DBC;
            --neon-gold: #FFE600;
            --bg-dark: #02040a;
            --glass-bg: rgba(8, 12, 25, 0.7);
        }

        html, body {
            font-family: 'Pyidaungsu', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            perspective: 2000px;
        }

        /* 10XX CLEAN SPATIAL LANDING PAGE */
        #landing { 
            position: fixed; inset: 0; z-index: 9999; 
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            padding: 8vh 0;
            transform-style: preserve-3d;
        }

        .landing-bg {
            position: absolute; inset: -5vw;
            background: url('https://i.imgur.com/npi3IR8.jpeg') center/contain no-repeat;
            filter: brightness(0.9) contrast(1.15);
            z-index: 3;
            transform: translateZ(50px);
            transition: transform 0.1s linear;
        }

        .cyber-floor {
            position: absolute; bottom: -30vh; left: -50vw; right: -50vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(1200px) rotateX(75deg) translateZ(-150px);
            animation: grid-scroll 3s linear infinite;
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, transparent 70%);
        }
        
        .horizon-glow {
            position: absolute; bottom: 38vh; left: -20vw; right: -20vw; height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 50px 15px var(--neon-cyan), 0 0 100px 30px var(--neon-pink);
            z-index: 2; opacity: 0.6;
            transform: translateZ(-80px);
        }

        #landing::before { 
            content: ''; position: absolute; inset: 0; 
            background: radial-gradient(circle at center, transparent 20%, rgba(2,4,10,0.95) 100%); 
            z-index: 4; pointer-events: none;
        }

        .chest-core {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%) translateZ(80px);
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,240,255,0.3) 0%, transparent 60%);
            z-index: 5; mix-blend-mode: screen; pointer-events: none;
            animation: core-throb 2.5s ease-in-out infinite;
        }

        .particle-box { position: absolute; inset: 0; z-index: 6; pointer-events: none; transform: translateZ(120px); }
        .glow-dust { 
            position: absolute; border-radius: 50%; background: #fff; opacity: 0; 
            animation: particle-drift 10s linear infinite; 
            box-shadow: 0 0 15px 2px currentColor; 
        }
        
        .premium-unlock-container {
            position: relative; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 5vh;
            transform-style: preserve-3d;
            animation: float-core 5s ease-in-out infinite;
        }

        .diamond-core-container {
            position: relative; width: 140px; height: 140px; margin-bottom: 2vh;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .data-ring {
            position: absolute; inset: -25px; border: 2px dashed rgba(0,240,255,0.4); border-radius: 50%;
            animation: spin-slow 15s linear infinite; pointer-events: none;
        }
        .data-ring::after {
            content: ''; position: absolute; inset: -12px; border: 1px solid rgba(255,61,188,0.4); border-radius: 50%;
            animation: spin-slow-reverse 10s linear infinite;
        }
        .diamond-layer-1, .diamond-layer-2, .diamond-layer-3 {
            position: absolute; inset: 0; border: 2px solid transparent; transform: rotate(45deg); transition: all 0.5s;
        }
        .diamond-layer-1 { border-color: var(--neon-cyan); box-shadow: 0 0 40px var(--neon-cyan), inset 0 0 20px var(--neon-cyan); animation: spin-slow 12s linear infinite; }
        .diamond-layer-2 { inset: 15px; border-color: var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); animation: spin-slow-reverse 8s linear infinite; }
        .diamond-layer-3 { inset: 30px; background: rgba(0, 240, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8); animation: pulse-glow 2s infinite alternate; }
        
        .diamond-core-container:hover { transform: scale(1.15) translateZ(80px); }
        .diamond-core-container:hover .diamond-layer-1 { transform: rotate(135deg); border-width: 6px; box-shadow: 0 0 80px var(--neon-cyan); }
        .diamond-core-container:hover .diamond-layer-2 { transform: rotate(-45deg); border-color: var(--neon-gold); box-shadow: 0 0 40px var(--neon-gold);}
        .diamond-core-container:hover .diamond-layer-3 { background: rgba(0, 240, 255, 0.5); transform: rotate(45deg) scale(0.7); }
        .diamond-core-container:hover .data-ring { border-color: var(--neon-cyan); transform: scale(1.1); }

        /* MAIN APP UI */
        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: column; background: var(--bg-dark); position: relative; }
        
        header { 
            position: relative; z-index: 100; background: rgba(2,4,10,0.85); backdrop-filter: blur(30px); 
            padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(0,240,255,0.3); 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 10px 40px rgba(0,240,255,0.1); 
        }

        .ai-hub { position: fixed; bottom: 30px; right: 25px; z-index: 500; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .ai-bubble { 
            background: #ffffff; color: #000; padding: 20px 25px; border-radius: 30px 30px 4px 30px; 
            font-size: 0.95rem; font-weight: 800; margin-bottom: 15px; 
            box-shadow: 0 15px 50px rgba(0,240,255,0.7); opacity: 0; transform: translateY(20px); 
            transition: 0.5s; max-width: 320px; border-left: 10px solid var(--neon-pink); line-height: 1.6; 
        }
        .ai-bubble.show { opacity: 1; transform: translateY(0); }
        .ai-avatar-wrapper { position: relative; cursor: pointer; pointer-events: auto; }
        .ai-avatar { width: 140px; height: auto; filter: drop-shadow(0 0 35px var(--neon-cyan)); animation: float-ai 4s ease-in-out infinite; object-fit: contain; }
        .ai-ring { position: absolute; inset: -10px; border: 2px dashed var(--neon-cyan); border-radius: 50%; animation: spin-slow 10s linear infinite; opacity: 0.5; }

        .sop-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10; perspective: 1500px; }
        
        .page { 
            position: relative; width: 100%; max-width: 680px; height: 78vh; 
            background: linear-gradient(rgba(10,15,30,0.85), rgba(10,15,30,0.85)) padding-box,
                        linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold)) border-box;
            border: 3px solid transparent;
            backdrop-filter: blur(40px); border-radius: 40px; padding: 3.5rem; overflow-y: auto; 
            display: none; flex-direction: column; 
            box-shadow: 0 40px 120px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,240,255,0.1); 
        }
        .page.active { display: flex; animation: card-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* CHAT PANEL */
        #ai-panel { position: fixed; inset: 0; background: rgba(2,4,10,0.95); backdrop-filter: blur(30px); z-index: 1000; display: none; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 20px; }
        
        .chat-input-box { padding: 1.5rem; background: rgba(5,8,15,0.95); display: flex; gap: 15px; border-top: 1px solid rgba(0,240,255,0.3); padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); align-items: center; }
        .chat-input-box .mic-btn { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.4); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .chat-input-box .mic-btn:hover { background: rgba(0,240,255,0.3); box-shadow: 0 0 15px rgba(0,240,255,0.5); }
        .chat-input-box .mic-btn.listening { background: rgba(255,61,188,0.3); border-color: var(--neon-pink); animation: pulse-mic 1s infinite; box-shadow: 0 0 20px var(--neon-pink); }
        
        .chat-input-box input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); color: #fff; padding: 20px 25px; border-radius: 40px; outline: none; font-size: 1.15rem; transition: 0.3s; }
        .chat-input-box input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 25px rgba(0,240,255,0.2); background: rgba(255,255,255,0.1); }
        .chat-input-box input::placeholder { transition: opacity 0.3s ease-in-out; opacity: 0.7; }
        .chat-input-box .send-btn { background: var(--neon-cyan); color: black; font-weight: 900; width: 65px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 30px; transition: 0.2s; box-shadow: 0 0 25px rgba(0,240,255,0.5); cursor: pointer; }

        .msg { padding: 20px 28px; border-radius: 30px; max-width: 85%; line-height: 1.7; font-size: 1.1rem; }
        .msg.bot { background: rgba(30, 41, 60, 0.6); align-self: flex-start; border-bottom-left-radius: 6px; border: 1px solid rgba(0,240,255,0.3); color: #ffffff; backdrop-filter: blur(15px); }
        .msg.bot * { background: transparent !important; }
        .msg.bot img { width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .msg.user { background: var(--neon-cyan); color: #000; font-weight: 900; align-self: flex-end; border-bottom-right-radius: 6px; box-shadow: 0 8px 25px rgba(0,240,255,0.3); }
        
        .scan-bar { position: absolute; width: 100vw; height: 6px; background: #fff; box-shadow: 0 0 60px 15px var(--neon-cyan), 0 0 120px 30px var(--neon-pink); z-index: 10000; top: -100px; pointer-events: none; }

        /* ADMIN DASHBOARD */
        #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(50px); z-index: 2000; display: none; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-cyan); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .admin-title { font-family: 'Space Grotesk', sans-serif; color: var(--neon-cyan); font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px var(--neon-cyan); }
        .admin-section { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
        .admin-label { color: var(--neon-gold); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        .admin-textarea { width: 100%; height: 120px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.3); border-radius: 15px; color: #fff; padding: 15px; font-family: 'Pyidaungsu', sans-serif; font-size: 1rem; outline: none; resize: none; transition: 0.3s; }
        .admin-save-btn { background: var(--neon-cyan); color: black; font-weight: 900; padding: 15px 0; border-radius: 15px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1rem; box-shadow: 0 0 25px rgba(0,240,255,0.4); transition: 0.3s; cursor: pointer; text-align: center; margin-top: 1rem; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .pass-box { background: rgba(10,15,30,0.9); border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 3rem; text-align: center; box-shadow: 0 0 40px rgba(0,240,255,0.2); transform: scale(0.9); transition: 0.3s; width: 90%; max-width: 400px; }
        .pass-box.show { transform: scale(1); }
        .pass-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-cyan); color: white; padding: 15px 20px; border-radius: 10px; margin: 20px 0; outline: none; font-size: 1.2rem; text-align: center; letter-spacing: 2px; transition: 0.3s; }
        .shake { animation: shake 0.5s; border-color: red !important; box-shadow: 0 0 20px rgba(255,0,0,0.5) !important; }

        /* Keyframes */
        @keyframes pulse-mic { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-slow-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes float-core { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes grid-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }
        @keyframes core-throb { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.6; } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes particle-drift { 0% { transform: translateY(110vh) translateZ(0); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(-10vh) translateZ(300px); opacity: 0; } }
        @keyframes card-reveal { 0% { opacity: 0; transform: rotateX(15deg) translateY(80px) scale(0.9); } 100% { opacity: 1; transform: rotateX(0deg) translateY(0) scale(1); } }
        @keyframes float-ai { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes laser-scan { 0% { top: -10vh; opacity: 1; } 80% { opacity: 1; } 100% { top: 110vh; opacity: 0; } }
    </style>
</head>
<body>

    <audio id="chat-bgm" loop preload="auto"><source src="https://actions.google.com/sounds/v1/science_fiction/computer_data_processing.ogg" type="audio/ogg"></audio>

    <div id="scan-fx" class="scan-bar"></div>

    <!-- MODALS -->
    <div id="password-modal" class="modal-overlay">
        <div class="pass-box" id="pass-box">
            <i data-lucide="lock" class="text-cyan-400 mx-auto mb-4" size="50"></i>
            <h2 class="text-cyan-400 font-black text-xl tracking-widest uppercase">Admin Authorization</h2>
            <input type="password" id="admin-pass-input" class="pass-input" placeholder="•••••••••" onkeypress="if(event.key === 'Enter') verifyAdmin()">
            <div class="flex gap-4 justify-center mt-2">
                <button onclick="closePasswordModal()" class="px-6 py-2 rounded-lg border border-red-500 text-red-500 font-bold hover:bg-red-500/20 transition-all">Cancel</button>
                <button onclick="verifyAdmin()" class="px-6 py-2 rounded-lg bg-cyan-500 text-black font-black hover:scale-105 transition-all">Unlock</button>
            </div>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="pass-box" id="name-box">
            <i data-lucide="user-check" class="text-cyan-400 mx-auto mb-4" size="50"></i>
            <h2 class="text-cyan-400 font-black text-xl tracking-widest uppercase">Identity Link</h2>
            <input type="text" id="user-name-input" class="pass-input" placeholder="သင့်နာမည်ကို ရိုက်ထည့်ပါ..." onkeypress="if(event.key === 'Enter') submitName()">
            <div class="flex gap-4 justify-center mt-4">
                <button onclick="closeNameModal()" class="px-6 py-2 rounded-lg border border-red-500 text-red-500 font-bold hover:bg-red-500/20 transition-all">Cancel</button>
                <button onclick="submitName()" class="px-6 py-2 rounded-lg bg-cyan-500 text-black font-black hover:scale-105 transition-all">Access</button>
            </div>
        </div>
    </div>

    <!-- LANDING -->
    <div id="landing">
        <div class="horizon-glow"></div>
        <div class="cyber-floor" id="floor-fx"></div>
        <div class="landing-bg" id="parallax-bg"></div>
        <div class="particle-box" id="dust-layer"></div>
        <div class="chest-core"></div>
        <div class="premium-unlock-container">
            <div class="diamond-core-container" onclick="triggerScan()">
                <div class="data-ring"></div>
                <div class="diamond-layer-1"></div><div class="diamond-layer-2"></div><div class="diamond-layer-3"></div>
                <i data-lucide="zap" class="text-white relative z-20" size="50"></i>
            </div>
            <div class="inline-block px-6 py-2 rounded-full mt-2">
                <span class="text-cyan-400 font-black tracking-[0.4em] text-xs uppercase" style="text-shadow: 0 0 10px var(--neon-cyan);">Initialize System</span>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container">
        <header>
            <div class="flex items-center gap-5">
                <img src="https://i.imgur.com/gAev5xH.png" alt="Logo" class="w-16 h-16 rounded-2xl border-2 border-cyan-400 shadow-[0_0_20px_rgba(0,240,255,0.4)]">
                <div>
                    <div class="font-black text-base text-white tracking-[0.2em] uppercase">Live's Kabob</div>
                    <div class="text-[9px] text-cyan-400 font-bold uppercase tracking-[0.5em] mt-1">Neural Tata v11.8</div>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="emergencySOS()" class="bg-red-500/20 border border-red-500 text-red-500 px-6 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-red-500 transition-all">SOS</button>
                <button onclick="toggleMute()" class="p-4 bg-cyan-500/10 border border-cyan-400/30 rounded-full hover:bg-cyan-500/30 transition-all"><i data-lucide="volume-2" size="22" class="text-cyan-400" id="vol-icon"></i></button>
                <button onclick="openPasswordModal()" class="p-4 bg-purple-500/10 border border-purple-400/30 rounded-full hover:bg-purple-500/30 transition-all"><i data-lucide="cpu" size="22" class="text-purple-400"></i></button>
            </div>
        </header>

        <div class="ai-hub">
            <div class="ai-bubble" id="speak-bubble">မင်္ဂလာပါ'' တာတာ''အဆင်သင့်ရှိပါတယ်ရှင့် ✨</div>
            <div class="ai-avatar-wrapper" onclick="toggleAI()">
                <div class="ai-ring"></div>
                <img src="https://i.imgur.com/OTpyIVK.png" alt="Tata AI" class="ai-avatar" onerror="this.src='https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/bot.svg'">
            </div>
        </div>

        <main class="sop-stage">
            <div id="sop-pages"></div>
            <div class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-12 z-[200]">
                <button onclick="changePage(-1)" class="w-20 h-20 rounded-full border-2 border-cyan-400 flex items-center justify-center text-cyan-400 hover:bg-cyan-400 hover:text-black transition-all bg-black/50 backdrop-blur-md shadow-[0_0_20px_rgba(0,240,255,0.2)]"><i data-lucide="chevron-left" size="42"></i></button>
                <div id="page-indicator" class="text-cyan-400 font-black text-3xl tracking-[0.3em] min-w-[140px] text-center" style="text-shadow: 0 0 20px rgba(0,240,255,0.6);">1 / 15</div>
                <button onclick="changePage(1)" class="w-20 h-20 rounded-full border-2 border-cyan-400 flex items-center justify-center text-cyan-400 hover:bg-cyan-400 hover:text-black transition-all bg-black/50 backdrop-blur-md shadow-[0_0_20px_rgba(0,240,255,0.2)]"><i data-lucide="chevron-right" size="42"></i></button>
            </div>
        </main>
    </div>

    <!-- AI CHAT PANEL -->
    <div id="ai-panel">
        <header class="p-8 flex justify-between border-b border-cyan-400/50 items-center bg-transparent backdrop-blur-3xl">
            <div class="flex items-center gap-6">
                <div class="w-24 h-24 bg-white/5 rounded-3xl flex items-center justify-center border border-cyan-400/50">
                    <img src="https://i.imgur.com/OTpyIVK.png" class="w-full h-full object-contain filter drop-shadow-2xl">
                </div>
                <div>
                    <div class="font-black text-cyan-400 tracking-widest text-3xl uppercase leading-none">TATA v11.8</div>
                    <div class="text-[11px] text-green-400 font-bold tracking-[0.8em] uppercase mt-3" id="user-linked-text">Identity Core Linked</div>
                </div>
            </div>
            <button onclick="closeChatPanel()"><i data-lucide="x" class="text-white hover:text-cyan-400 transition-colors" size="55"></i></button>
        </header>
        <div class="chat-area" id="chat-box"></div>
        <div id="typing-box" class="px-12 py-4 text-sm text-cyan-400 italic hidden flex items-center gap-3 font-bold"><span class="w-3 h-3 bg-cyan-400 rounded-full animate-ping"></span> Thinking... ✨</div>
        <div class="chat-input-box">
            <button id="mic-btn" class="mic-btn" onclick="toggleVoiceInput()"><i data-lucide="mic" size="24" class="text-cyan-400"></i></button>
            <input type="text" id="ai-input" placeholder="ရောင်းအား အခြေအနေ ဘယ်လိုလဲ...">
            <div class="send-btn" onclick="sendQuery()"><i data-lucide="sparkles" size="28"></i></div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <div class="admin-header"><h1 class="admin-title">Neural Core Dashboard</h1><button onclick="closeAdmin()"><i data-lucide="x" class="text-white" size="40"></i></button></div>
        <div class="admin-section"><label class="admin-label">Brain Rules</label><textarea id="admin-rules" class="admin-textarea" placeholder="ဥပမာ - မင်းဆိုတဲ့စကားလုံး လုံးဝမသုံးရ။"></textarea></div>
        <div class="admin-section"><label class="admin-label" style="color: var(--neon-pink);">Live Menu & Data</label><textarea id="admin-data" class="admin-textarea" style="border-color: rgba(255,61,188,0.3);" placeholder="ဥပမာ - Signature ကင် ၃ မျိုးပဲရတော့မည်။"></textarea></div>
        <div class="admin-section"><label class="admin-label" style="color: var(--neon-cyan);">Floating Thoughts</label><textarea id="admin-bubbles" class="admin-textarea" style="border-color: rgba(0,240,255,0.3); height: 80px;" placeholder="တစ်ကြောင်းချင်းစီ ခွဲရေးပေးပါ။"></textarea></div>
        <div class="admin-section"><label class="admin-label" style="color: #A855F7;">Visual Memory (Photo links)</label><textarea id="admin-files" class="admin-textarea" style="border-color: rgba(168,85,247,0.4); height: 80px;" placeholder="🔗 ပုံလင့်ခ်များကို ဤနေရာတွင် ထည့်သွင်းပါ။"></textarea></div>
        <div class="admin-save-btn" onclick="saveAdminData()">Inject to Neural Core <i data-lucide="upload-cloud" class="inline ml-2"></i></div>
    </div>

    <script>
        lucide.createIcons();
        let curPage = 0; let isMuted = false; let isChatting = false; let currentUserName = ""; let isAppActive = false;
        const apiKey = ""; 

        // Particle System
        function generateDust() {
            const container = document.getElementById('dust-layer');
            if(!container) return;
            const colors = ['var(--neon-cyan)', 'var(--neon-pink)', '#ffffff', 'var(--neon-gold)'];
            for (let i = 0; i < 80; i++) {
                const dot = document.createElement('div');
                dot.className = 'glow-dust';
                const size = Math.random() * 6 + 2;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.animationDelay = `${Math.random() * 20}s`;
                dot.style.animationDuration = `${Math.random() * 8 + 8}s`;
                dot.style.color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.background = dot.style.color;
                container.appendChild(dot);
            }
        }

        // 10-Second Random Robotic Bird Sounds
        const robotBirds = ["https://actions.google.com/sounds/v1/science_fiction/robot_code.ogg", "https://actions.google.com/sounds/v1/science_fiction/robot_code_2.ogg", "https://actions.google.com/sounds/v1/science_fiction/beep_short.ogg", "https://actions.google.com/sounds/v1/science_fiction/digital_beeps.ogg", "https://actions.google.com/sounds/v1/science_fiction/machine_scan.ogg", "https://actions.google.com/sounds/v1/science_fiction/robot_code_3.ogg", "https://actions.google.com/sounds/v1/science_fiction/robot_code_4.ogg", "https://actions.google.com/sounds/v1/science_fiction/robot_code_5.ogg", "https://actions.google.com/sounds/v1/science_fiction/sci_fi_beep.ogg", "https://actions.google.com/sounds/v1/science_fiction/space_swoosh.ogg"];
        function playRoboticBird() { if(isMuted || isChatting || !isAppActive) return; const audio = new Audio(robotBirds[Math.floor(Math.random() * robotBirds.length)]); audio.volume = 0.4; audio.play().catch(()=>{}); }

        // Dynamic Placeholders
        const dynamicPlaceholders = ["ဒီနေ့ရောင်းအား အခြေအနေ ဘယ်လိုလဲ...", "SOP အချက်တွေကို သုံးသပ်မယ်...", "Top Selling Menu တွေ အစီရင်ခံပါ...", "အမိန့်ပေးပါ ကိုတုတ်..."];
        let placeholderIndex = 0;
        setInterval(() => { const i = document.getElementById('ai-input'); if (i && document.activeElement !== i && i.value === '') { placeholderIndex = (placeholderIndex + 1) % dynamicPlaceholders.length; i.setAttribute('placeholder', dynamicPlaceholders[placeholderIndex]); } }, 3500);

        // Voice Recognition (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition(); recognition.lang = 'my-MM';
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('listening');
            recognition.onresult = (e) => document.getElementById('ai-input').value = e.results[0][0].transcript;
            recognition.onend = () => document.getElementById('mic-btn').classList.remove('listening');
        }
        function toggleVoiceInput() { if(recognition) { if(document.getElementById('mic-btn').classList.contains('listening')) recognition.stop(); else recognition.start(); } }

        // Persistence
        document.addEventListener("DOMContentLoaded", () => {
            const r = localStorage.getItem("tata_brain_rules"), d = localStorage.getItem("tata_brain_data"), f = localStorage.getItem("tata_brain_files"), b = localStorage.getItem("tata_brain_bubbles");
            if(r) document.getElementById('admin-rules').value = r;
            if(d) document.getElementById('admin-data').value = d;
            if(f) document.getElementById('admin-files').value = f;
            if(b) document.getElementById('admin-bubbles').value = b;
        });

        // Identity & Chat
        function toggleAI() { if(isChatting) closeChatPanel(); else if(!currentUserName) openNameModal(); else openChatPanel(); }
        function openNameModal() { document.getElementById('name-modal').style.display = 'flex'; setTimeout(()=>document.getElementById('name-box').classList.add('show'),10); }
        function closeNameModal() { document.getElementById('name-box').classList.remove('show'); setTimeout(()=>document.getElementById('name-modal').style.display='none',300); }
        function submitName() { const val = document.getElementById('user-name-input').value.trim(); if(val) { currentUserName = val; document.getElementById('user-linked-text').textContent = `Linked to: ${val}`; closeNameModal(); openChatPanel(); } else document.getElementById('name-box').classList.add('shake'); }
        function openChatPanel() { document.getElementById('ai-panel').style.display = 'flex'; isChatting = true; document.getElementById('chat-bgm').play().catch(()=>{}); if(document.getElementById('chat-box').children.length === 0) addBotMessage(currentUserName === "ကိုတုတ်" ? "မင်္ဂလာပါ ကိုတုတ်.. တာတာ အဆင်သင့်ရှိပါတယ်ရှင့်။" : `မင်္ဂလာပါ ${currentUserName}.. ဘာအကူအညီပေးရမလဲရှင့်?`); }
        function closeChatPanel() { document.getElementById('ai-panel').style.display = 'none'; isChatting = false; document.getElementById('chat-bgm').pause(); }

        // Admin Security
        function openPasswordModal() { document.getElementById('password-modal').style.display = 'flex'; setTimeout(()=>document.getElementById('pass-box').classList.add('show'),10); }
        function closePasswordModal() { document.getElementById('pass-box').classList.remove('show'); setTimeout(()=>document.getElementById('password-modal').style.display='none',300); }
        function verifyAdmin() { const i = document.getElementById('admin-pass-input'); if(i.value === '@admin$103') { closePasswordModal(); document.getElementById('admin-panel').style.display='flex'; closeChatPanel(); } else document.getElementById('pass-box').classList.add('shake'); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function saveAdminData() { localStorage.setItem("tata_brain_rules", document.getElementById('admin-rules').value); localStorage.setItem("tata_brain_data", document.getElementById('admin-data').value); localStorage.setItem("tata_brain_files", document.getElementById('admin-files').value); localStorage.setItem("tata_brain_bubbles", document.getElementById('admin-bubbles').value); closeAdmin(); }

        // 3D Parallax & FX
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40, y = (window.innerHeight / 2 - e.pageY) / 40;
            const l = document.getElementById('landing'), b = document.getElementById('parallax-bg'), f = document.getElementById('floor-fx');
            if(l) l.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            if(b) b.style.transform = `translateX(${x*1.5}px) translateY(${y*1.5}px) translateZ(50px)`;
            if(f) f.style.transform = `perspective(1200px) rotateX(75deg) translateZ(-150px) translateX(${x}px)`;
        });

        function triggerScan() { document.getElementById('scan-fx').style.animation = 'laser-scan 0.8s forwards'; setTimeout(initApp, 600); }
        function initApp() { document.getElementById('landing').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; buildSOP(); isAppActive = true; setInterval(playRoboticBird, 10000); startPersonality(); }

        const sopData = [{ t: "မဟာဗျူဟာ", c: "Live's ကို Premium Restaurant အဖြစ် ကူးပြောင်းမည်။" },{ t: "ရဲဘော် ၂၂ ဦး", c: "စီမံ (၃)၊ မီးဖို (၈)၊ အကင် (၄)၊ ဝန်ဆောင်မှု (၆)၊ ပံ့ပိုးရေး (၁)။" },{ t: "Battle-Ready", c: "မနက် ၈:၄၅ ရောက်ရမည်။ ၉:၀၀ အသင့်ဖြစ်ရမည်။" },{ t: "ဖုန်းတင်းကျပ်မှု", c: "ညနေ ၃ နာရီမှ ၉ နာရီအထိ ဖုန်းမသုံးရ။" },{ t: "၇ စက္ကန့် စံနှုန်း", c: "ဧည့်သည်ရောက်လျှင် ၇ စက္ကန့်အတွင်း နှုတ်ဆက်ပါ။" },{ t: "ကြိုတင်လုပ်ဆောင်မှု", c: "တစ်ရှူးနှင့် ရေကို ဧည့်သည်မတောင်းခင် ကြိုဖြည့်ပါ။" },{ t: "Final Wipe", c: "ဟင်းပွဲမထွက်ခင် ပန်းကန်ဘောင်ကို တစ်ရှူးဖြူဖြင့် သုတ်ပါ။" },{ t: "၃ စက္ကန့် စစ်ဆေးမှု", c: "အနံ့၊ အရောင်၊ အပူချိန်ကို ၃ စက္ကန့်အတွင်း စစ်ပါ။" },{ t: "တစ်ကိုယ်ရည်သန့်ရှင်းမှု", c: "လက်ကို စက္ကန့် ၂၀ ဆေးပါ။ စဉ်းတီတုံးအရောင်ခွဲသုံးပါ။" },{ t: "L.A.S.T System", c: "Listen, Apologize, Solve, Thank ကိုသုံးပါ။" },{ t: "ရိုးသားမှု", c: "Tips Box ထဲသို့ Tips အားလုံးထည့်ပါ။" },{ t: "သန့်ရှင်းရေး အလှည့်", c: "Cleaning Squad အလှည့်ကျ သန့်ရှင်းရေးလုပ်ပါ။" },{ t: "Content Standards", c: "Boss ဗီဒီယိုရိုက်နေစဉ် ပုံမှန်အလုပ်လုပ်ပါ။" },{ t: "Sobriety", c: "အရက်၊ ဆေးလိပ်၊ ကွမ်းနံ့ လုံးဝမရှိစေရ။" },{ t: "God Staff", c: "အကောင်းဆုံးဝန်ထမ်းကို လစဉ်ဆုချီးမြှင့်မည်။" }];
        function buildSOP() { const c = document.getElementById('sop-pages'); c.innerHTML = ''; sopData.forEach((item, i) => { const div = document.createElement('div'); div.className = `page ${i===curPage?'active':''}`; div.innerHTML = `<div class="mb-10 flex items-center"><span style="background:var(--neon-gold); color:black; font-weight:900; padding:5px 12px; border-radius:8px; font-size:0.9rem; text-transform:uppercase; margin-right:15px; box-shadow: 0 0 15px rgba(255,230,0,0.6);">God Level</span><span class="bg-cyan-500/20 text-cyan-400 px-6 py-2.5 rounded-full text-xs font-black uppercase border border-cyan-400/40">Protocol ${i+1}</span></div><h1 class="text-cyan-400 font-black text-5xl mb-12 border-l-8 border-pink-500 pl-8 uppercase leading-tight">${item.t}</h1><div class="text-slate-100 text-3xl leading-relaxed font-bold">${item.c}</div><div class="mt-auto opacity-10 flex justify-center"><i data-lucide="crown" size="160"></i></div>`; c.appendChild(div); }); lucide.createIcons(); }
        
        // Corrected changePage function: Changed 'pages' to 'p' to fix ReferenceError
        function changePage(dir) { 
            const p = document.querySelectorAll('.page'); 
            if (p.length === 0) return;
            p[curPage].classList.remove('active'); 
            curPage = (curPage + dir + p.length) % p.length; 
            p[curPage].classList.add('active'); 
            document.getElementById('page-indicator').textContent = `${curPage + 1} / ${sopData.length}`; 
        }
        
        function toggleMute() { isMuted = !isMuted; document.getElementById('vol-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2'); lucide.createIcons(); }

        // AI Core Logic
        function addBotMessage(txt) { 
            const chat = document.getElementById('chat-box');
            const b = document.createElement('div'); 
            b.className = 'msg bot'; 
            b.innerHTML = `<div>${txt}</div>`; 
            chat.appendChild(b); 
            chat.scrollTop = chat.scrollHeight; 
        }
        async function sendQuery() { 
            const i = document.getElementById('ai-input'), q = i.value.trim(); 
            if(!q) return; 
            const u = document.createElement('div'); 
            u.className = 'msg user'; 
            u.textContent = q; 
            document.getElementById('chat-box').appendChild(u); 
            i.value = ''; 
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight; 
            document.getElementById('typing-box').classList.remove('hidden'); 
            const res = await callAI(q); 
            document.getElementById('typing-box').classList.add('hidden'); 
            addBotMessage(res); 
        }
        async function callAI(p) {
            const rules = localStorage.getItem("tata_brain_rules") || "", data = localStorage.getItem("tata_brain_data") || "", files = localStorage.getItem("tata_brain_files") || "";
            const sys = `You are 'တာတာ' (Tata), the Executive AI Manager for Live's Kabob. Current user: ${currentUserName}. Boss is 'ကိုတုတ်'. NEVER use 'မင်း'. You reply with TEXT and HTML only. Tone: Ultra-concise (15 words max). IMAGES: If user asks for photos/files, scan [FILE MEMORY] for any URLs and append: <br><img src="THE_URL" style="width:100%; border-radius:15px; margin-top:10px; border:2px solid var(--neon-cyan);">. DO NOT just list the link text. \n\n[BRAIN RULES]: ${rules}\n[LIVE DATA]: ${data}\n[FILE MEMORY]: ${files}`;
            try { 
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({ 
                        contents:[{parts:[{text:p}]}], 
                        systemInstruction:{parts:[{text:sys}]} 
                    }) 
                }); 
                const d = await r.json(); 
                return d.candidates?.[0]?.content?.parts?.[0]?.text || "နားမလည်ပါရှင့်။"; 
            } catch(e) { 
                return "Link Error."; 
            }
        }
        function startPersonality() { 
            setInterval(() => { 
                if(isChatting) return; 
                let list = ["ကိုတုတ်ရေ... အသင့်ပါပဲ ❤️", "Final Wipe စစ်ပြီးပြီလား ✨"]; 
                const c = localStorage.getItem("tata_brain_bubbles"); 
                if(c) list = c.split('\n').filter(t => t.trim() !== ''); 
                const b = document.getElementById('speak-bubble'); 
                if(list.length > 0) {
                    b.textContent = list[Math.floor(Math.random()*list.length)]; 
                    b.classList.add('show'); 
                    setTimeout(() => b.classList.remove('show'), 9000); 
                }
            }, 35000); 
        }
        function emergencySOS() { if(!currentUserName) { openNameModal(); return; } toggleAI(); addBotMessage(`${currentUserName}... SOS Mode! အစားထိုးဖို့ စီစဉ်ရမလား? 🆘`); }
        document.getElementById('ai-input').addEventListener("keypress", (e) => { if(e.key === "Enter") sendQuery(); });
        
        window.onload = () => { 
            generateDust(); 
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
